name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run all tests
        run: |
          FAILED=0
          for f in src/test/*.test.ts; do
            BASENAME=$(basename "$f")
            # Per-file timeout (60s) prevents one hanging test from blocking
            # the entire CI. If a test hangs, the timeout kills it, we log
            # the failure, and move on to the next file.
            # --transpile-only: skip type-checking. The test files are
            # script-style (console.log assertions, no test framework) and
            # some have implicit-any TS7006 warnings in test lambdas that
            # would cause ts-node to exit non-zero without --transpile-only.
            # Type-checking of the actual source is done separately via tsc.
            RESULT=$(timeout 60 bash -c "TS_NODE_COMPILER_OPTIONS='{\"lib\":[\"ES2020\",\"DOM\"],\"types\":[\"node\"]}' npx ts-node --transpile-only \"$f\" 2>&1" | grep "Results:" || echo "Results: TIMEOUT or CRASH (no summary line)")
            echo "$BASENAME: $RESULT"
            echo "$RESULT" | grep -q ", 0 failed" || FAILED=1
          done
          exit $FAILED
