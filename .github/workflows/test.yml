name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # fail-fast: false so ALL chunks run even if one fails. This lets us
      # see every failure in a single CI cycle (critical for parallel diagnosis).
      fail-fast: false
      matrix:
        # 6 chunks × ~66 files each. Deterministic chunking (i % 6 === N-1)
        # guarantees local chunk N == CI chunk N for the same commit.
        # To reproduce a CI chunk failure locally:
        #   npx ts-node --transpile-only scripts/run_tests.ts --chunk N --total 6
        chunk: [1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run test chunk ${{ matrix.chunk }}/6
        run: |
          npx ts-node --transpile-only scripts/run_tests.ts \
            --chunk ${{ matrix.chunk }} --total 6 \
            --parallel 3 --timeout 90
