name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run all tests
        run: |
          FAILED=0
          for f in src/test/*.test.ts; do
            RESULT=$(TS_NODE_COMPILER_OPTIONS='{"lib":["ES2020","DOM"],"types":["node"]}' npx ts-node "$f" 2>&1 | grep "Results:")
            echo "$(basename $f): $RESULT"
            echo "$RESULT" | grep -q ", 0 failed" || FAILED=1
          done
          exit $FAILED
